---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true
  become: true

- name: Start nginx service
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
  become: true

- name: Create custom index.html
  ansible.builtin.copy:
    content: |
      <h1>Nginx installed by Ansible Role!</h1>
    dest: /var/www/html/index.html
    mode: "0644"
  become: true
